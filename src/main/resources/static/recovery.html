<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness AI Tracker - Recovery</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #374151;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0 0 6px;
            font-size: 28px;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
        }

        .topbar-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary {
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        .panel {
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
        }

        .status {
            margin-bottom: 16px;
            font-size: 14px;
            min-height: 20px;
            color: var(--muted);
        }

        .status.error {
            color: #fca5a5;
        }

        .recovery-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .recovery-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            background: rgba(11, 18, 32, 0.7);
        }

        .recovery-item strong {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 14px;
        }

        .recovery-item span {
            font-size: 18px;
            font-weight: 700;
        }

        .empty {
            color: var(--muted);
        }

        @media (max-width: 700px) {
            .recovery-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="topbar">
        <div class="brand">
            <h1>Recovery</h1>
            <p>Your current recovery values.</p>
        </div>
        <div class="topbar-actions">
            <a class="btn btn-secondary" href="/dashboard.html">Dashboard</a>
            <a class="btn btn-secondary" href="/generate_workout.html">Generate Workout</a>
            <button id="logoutBtn" class="btn btn-danger" type="button">Log out</button>
        </div>
    </header>

    <section class="panel">
        <div id="statusBox" class="status">Loading recovery values...</div>
        <div id="recoveryList" class="recovery-list"></div>
    </section>
</div>

<script>
    (function () {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
            return;
        }

        const logoutBtn = document.getElementById('logoutBtn');
        const statusBox = document.getElementById('statusBox');
        const recoveryList = document.getElementById('recoveryList');

        logoutBtn.addEventListener('click', function () {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        loadRecovery();

        async function loadRecovery() {
            try {
                const response = await fetch('/api/recovery/latest', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (response.status === 404) {
                    statusBox.textContent = 'No recovery values found.';
                    recoveryList.innerHTML = '<div class="empty">Nothing to display yet.</div>';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load recovery values.');
                }

                const recovery = await response.json();
                renderRecovery(recovery);

                statusBox.textContent = 'Recovery values loaded.';
            } catch (error) {
                statusBox.textContent = error.message || 'Something went wrong.';
                statusBox.className = 'status error';
                recoveryList.innerHTML = '';
            }
        }

        function renderRecovery(recovery) {
            const entries = Object.entries(recovery || {});

            if (entries.length === 0) {
                recoveryList.innerHTML = '<div class="empty">No recovery values available.</div>';
                return;
            }

            recoveryList.innerHTML = entries.map(function ([key, value]) {
                return `
                    <div class="recovery-item">
                        <strong>${escapeHtml(formatLabel(key))}</strong>
                        <span>${escapeHtml(formatValue(value))}</span>
                    </div>
                `;
            }).join('');
        }

        function formatLabel(key) {
            return key
                .replace(/([A-Z])/g, ' $1')
                .replace(/^./, function (char) { return char.toUpperCase(); });
        }

        function formatValue(value) {
            if (value === null || typeof value === 'undefined' || value === '') {
                return '-';
            }

            if (Array.isArray(value)) {
                return value.length ? value.join(', ') : '-';
            }

            if (typeof value === 'object') {
                return JSON.stringify(value);
            }

            return String(value);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    })();
</script>
</body>
</html>
