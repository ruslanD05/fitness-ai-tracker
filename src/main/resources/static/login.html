<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Fitness AI Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --danger: #ef4444;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 55%, #1e293b);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      min-height: 20px;
      margin: 14px 0 0;
      font-size: 14px;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--accent); }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to continue tracking workouts, recovery, and generated plans.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Your password" required />
      </div>

      <button id="submitBtn" type="submit">Log in</button>
      <p id="message" class="message"></p>
    </form>

    <div class="footer">
      Don’t have an account? <a href="/register.html">Register</a>
    </div>
  </main>

  <script>
    const API_BASE = "";
    const TOKEN_KEY = "token";

    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageEl = document.getElementById("message");

    const existingToken = localStorage.getItem(TOKEN_KEY);
    if (existingToken) {
      window.location.href = "/dashboard.html";
    }

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`.trim();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage("");
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          const errorText = data.message || data.error || "Login failed";
          throw new Error(errorText);
        }

        if (!data.token) {
          throw new Error("No token received from server");
        }

        localStorage.setItem(TOKEN_KEY, data.token);
        setMessage("Login successful. Redirecting...", "success");
        window.location.href = "/dashboard.html";
      } catch (error) {
        setMessage(error.message || "Something went wrong", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
